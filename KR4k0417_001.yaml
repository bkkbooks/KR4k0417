body:
  text: 帝王要略爵有五等公者無厶也故文北厶為公歐陽詢藝文類聚卷五十一自營為私八厶為公言公正無私也左傳昭七年孔穎達正義伯把也持政事也藝文類聚卷五十一子猶孳也孳恤下之稱也同上又廣韻上聲六止孳字注男任也任治事受王命為君也藝文類聚卷五十一大夫者夫之言扶也言能扶成人也士者事也言能理庶事也左傳昭七年正義公者謂太師太傅太保也師王所尊也傅助王事保安也保王身也凡此皆內與王論道中參六官之事也三公者象鼎三足共承其上也殷時有阿衡伊摯佐之太甲改為保衡皆三公官也有三少少師少傅少保是為三孤副助三公者也孤者不掌官桀然孤特虞世南北堂書鈔卷五十夏官司馬教治兵之法職若有違命則征之暴賢害民則伐之北堂書鈔卷五十一冬官司空掌邦事營城郭都邑立社稷宗廟造宮宅器械監百工太平御覽卷二百八中書掌內事密詔下州郡及邊將不由尚書署也後關百事益重有令僕射丞郎令史秩與尚書同謂西漢時也舍人古官也周禮地官有舍人上士二人舍猶宮也掌官中之政出廩分財列仙傳曰琴高趙人善鼓琴為宋康王舍人也史記李斯為秦舍人漢書高祖起豐沛周勃傅亮樊噲皆以舍人從酈食其亦以舍人知宮內事初學記卷十一侍中古官也或曰風后為黃帝侍中周時號常伯者言其道可常遵也秦始皇復故冠貂蟬漢因而不改太平御覽卷二百十九侍帷幄受顧問拾遺於左右大駕出則負璽以從小則參乘秩二千石散騎常侍入侍左右出則侍事於廊廡之下北堂書鈔卷五十八初學記卷十二太平御覽卷二百二十四太史令取善記述者使記時事天下圖記最籍皆副焉北堂書鈔卷五十五太平御覽卷二百三十五御史中丞有石室以藏秘書圖讖之屬初學記卷十二導官令掌諸御米飛麵也北堂書鈔卷五十五司隸校尉周官也主徒隸董領京師察案公卿以下司隸出從緹騎北堂書鈔卷六十一五官中郎將領三署中郎將北堂書鈔卷六十三伏波將軍伏波船涉江海欲浪伏息也太平御覽卷二百四十期門郎漢武帝好微行因置期門郎與之期於殿門平帝改為虎賁中郎太平御覽卷二百四十一庶子主宮中並諸吏之適子及支庶在版籍者也行其秩序作其徒役授八次八舍之職以徼候太平御覽卷二百四十五冗從其有僕射事則掌帥之北堂書鈔卷六十三凡韍以韋為之以象裳色湯至周增以畫文夏山取仁可依湯火取其光明周龍章取其變化太平御覽卷六百九十一韠以象裳色文選潘安仁為賈謐贈陸機詩李善注間色有五紺紅縹紫流黃也文選江文通別賦注欚者以綸為之初學記卷二十二繳綸也綸于前望飛鳥而射之太平御覽卷八百三十二
